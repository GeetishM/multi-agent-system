version: "3.9"

services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: mas_api
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./api/eval_results:/app/eval_results
    depends_on:
      - redis
    restart: unless-stopped
    networks:
      - mas_network

  worker:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: mas_worker
    command: celery -A worker.celery_app worker --loglevel=info --concurrency=2
    env_file: .env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./api/eval_results:/app/eval_results
    depends_on:
      - redis
    restart: unless-stopped
    networks:
      - mas_network

  redis:
    image: redis:7-alpine
    container_name: mas_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - mas_network

  redis_ui:
    image: rediscommander/redis-commander:latest
    container_name: mas_redis_ui
    environment:
      - REDIS_HOSTS=local:redis:6379
    ports:
      - "8081:8081"
    depends_on:
      - redis
    restart: unless-stopped
    networks:
      - mas_network

volumes:
  redis_data:

networks:
  mas_network:
    driver: bridge